services:
  # ===== Testing =====

  # Run the full test suite
  test:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "pytest"]
    command: ["tests/", "-v", "--tb=short"]
    network_mode: none

  # Run tests with coverage report
  test-coverage:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "pytest"]
    command: ["tests/", "-v", "--cov=otscan", "--cov-report=term-missing"]
    network_mode: none

  # Interactive shell for manual testing
  shell:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/bash"]
    stdin_open: true
    tty: true
    network_mode: host

  # List all supported protocols
  list-protocols:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["list-protocols"]
    network_mode: none

  # ===== Simulated OT Lab =====

  # Full OT device simulator — 14 services on one container
  # Ports: 21, 23, 80, 102, 161, 502, 1883, 2404, 4840, 5900, 9600, 20000, 44818, 47808
  ot-lab:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "sim/ot_simulator.py"]
    networks:
      otnet:
        ipv4_address: 172.25.0.10
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',502)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  # Scan the simulated OT lab (all 13 protocols + credential checks)
  scan-lab:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["scan", "172.25.0.10", "--mode", "active", "--timeout", "10", "--no-banner"]
    depends_on:
      ot-lab:
        condition: service_healthy
    networks:
      - otnet

  # Scan lab with JSON report output
  scan-lab-report:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["scan", "172.25.0.10", "--mode", "active", "--timeout", "10",
              "--format", "json", "-o", "/reports/otscan_lab_report.json", "--no-banner"]
    depends_on:
      ot-lab:
        condition: service_healthy
    volumes:
      - ./reports:/reports
    networks:
      - otnet

  # Probe a single protocol on the lab
  # Usage: docker compose run --rm probe-lab 502 "Modbus TCP"
  probe-lab:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["otscan", "probe", "172.25.0.10"]
    depends_on:
      ot-lab:
        condition: service_healthy
    networks:
      - otnet

  # ===== Scan real targets =====

  # Scan a target (pass TARGET via environment)
  scan:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["scan", "${TARGET:-192.168.1.0/24}", "--mode", "${MODE:-safe}"]
    network_mode: host

networks:
  otnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
